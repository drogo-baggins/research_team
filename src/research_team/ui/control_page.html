<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Research Team Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e; color: #e0e0e0;
      display: flex; flex-direction: column; height: 100vh;
    }
    header {
      background: #16213e; padding: 10px 20px;
      border-bottom: 1px solid #0f3460;
      font-size: 14px; color: #a0a0c0;
    }
    .main { display: flex; flex: 1; overflow: hidden; }

    .chat-pane {
      flex: 1; display: flex; flex-direction: column;
      border-right: 1px solid #0f3460;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.agent { background: #0f3460; align-self: flex-start; }
    .msg.user  { background: #533483; align-self: flex-end; }
    .msg .sender { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .chat-input {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid #0f3460; background: #16213e;
    }
    .chat-input textarea {
      flex: 1; background: #0f3460; border: none; border-radius: 8px;
      color: #e0e0e0; padding: 8px 12px; font-size: 14px; resize: none;
      outline: none; height: 40px;
    }
    .chat-input button {
      background: #533483; color: #fff; border: none;
      border-radius: 8px; padding: 0 18px; cursor: pointer; font-size: 14px;
    }
    .chat-input button:hover { background: #6b44a0; }

    .right-pane {
      width: 340px; display: flex; flex-direction: column;
      background: #16213e;
    }

    .stream-pane {
      flex: 0 0 auto; max-height: 45%; display: flex; flex-direction: column;
      border-bottom: 1px solid #0f3460;
    }
    .stream-pane h3 {
      padding: 10px 16px; font-size: 13px;
      border-bottom: 1px solid #0f3460; color: #a0a0c0;
      flex-shrink: 0;
    }
    .stream-box {
      flex: 1; overflow-y: auto; padding: 10px 14px;
      font-size: 12px; line-height: 1.6; font-family: monospace;
      color: #b0d4ff; white-space: pre-wrap; word-break: break-word;
      min-height: 80px;
    }
    .stream-agent-label {
      font-size: 10px; color: #facc15; margin-bottom: 2px;
    }

    .progress-pane {
      flex: 1; display: flex; flex-direction: column;
    }
    .progress-pane h3 {
      padding: 10px 16px; font-size: 13px;
      border-bottom: 1px solid #0f3460; color: #a0a0c0;
      flex-shrink: 0;
    }
    .progress-log {
      flex: 1; overflow-y: auto; padding: 10px 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .log-item { font-size: 13px; display: flex; gap: 8px; align-items: flex-start; }
    .log-item .icon { width: 16px; flex-shrink: 0; }
    .log-item .done { color: #4ade80; }
    .log-item .running { color: #facc15; }
    .log-item .pending { color: #555; }
    .log-item .error { color: #f87171; }
    .log-item .warn { color: #fb923c; }

    .approval-banner {
      display: none;
      margin: 10px; padding: 12px 14px;
      background: #1e3a5f; border-radius: 10px;
      border: 1px solid #3b82f6;
    }
    .approval-banner.visible { display: block; }
    .approval-banner .approval-url {
      font-size: 11px; color: #93c5fd; word-break: break-all;
      margin-bottom: 4px; font-family: monospace;
    }
    .approval-banner .approval-title {
      font-size: 13px; font-weight: bold; color: #e0e0e0;
      margin-bottom: 6px;
    }
    .approval-banner .approval-buttons {
      display: flex; gap: 8px;
    }
    .approval-banner .btn-approve {
      flex: 1; padding: 8px; background: #22c55e; color: #000;
      border: none; border-radius: 8px; font-size: 13px;
      font-weight: bold; cursor: pointer;
    }
    .approval-banner .btn-approve:hover { background: #16a34a; }
    .approval-banner .btn-reject {
      flex: 1; padding: 8px; background: #374151; color: #e0e0e0;
      border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .approval-banner .btn-reject:hover { background: #4b5563; }
  </style>
</head>
<body>
  <header>🔬 Research Team Control Panel</header>
  <div class="main">

    <div class="chat-pane">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <textarea id="chatInput" placeholder="メッセージを入力... (Enter: 送信, Shift+Enter: 改行)"
          onkeydown="handleKey(event)"></textarea>
        <button onclick="sendChat()">送信</button>
      </div>
    </div>

    <div class="right-pane">
      <div class="stream-pane">
        <h3>⚡ エージェント出力</h3>
        <div class="stream-box" id="streamBox"></div>
      </div>

      <div class="progress-pane">
        <h3>📋 進捗ログ</h3>
        <div class="progress-log" id="progressLog"></div>

        <div class="approval-banner" id="approvalBanner">
          <div class="approval-url" id="approvalUrl"></div>
          <div class="approval-title" id="approvalTitle"></div>
          <div class="approval-buttons">
            <button class="btn-approve" onclick="signalApproval(true)">✅ 取り込む</button>
            <button class="btn-reject" onclick="signalApproval(false)">❌ スキップ</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let _currentStreamAgent = null;
    let _currentStreamEl = null;

    function appendMessage(sender, text, isUser) {
      const el = document.createElement('div');
      el.className = 'msg ' + (isUser ? 'user' : 'agent');
      el.innerHTML = `<div class="sender">${sender}</div><div>${escapeHtml(text)}</div>`;
      const box = document.getElementById('chatMessages');
      box.appendChild(el);
      box.scrollTop = box.scrollHeight;
    }

    function appendLog(status, text) {
      const icons = { done: '✓', running: '→', pending: '○' };
      const el = document.createElement('div');
      el.className = 'log-item';
      el.innerHTML = `<span class="icon ${status}">${icons[status]||'·'}</span><span>${escapeHtml(text)}</span>`;
      const log = document.getElementById('progressLog');
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
    }

    function streamDelta(agentName, delta) {
      const box = document.getElementById('streamBox');
      if (_currentStreamAgent !== agentName) {
        _currentStreamAgent = agentName;
        const label = document.createElement('div');
        label.className = 'stream-agent-label';
        label.textContent = '▶ ' + agentName;
        box.appendChild(label);
        _currentStreamEl = document.createElement('div');
        box.appendChild(_currentStreamEl);
      }
      if (_currentStreamEl) {
        _currentStreamEl.textContent += delta;
      }
      box.scrollTop = box.scrollHeight;
    }

    function setApprovalVisible(visible, url, title) {
      const banner = document.getElementById('approvalBanner');
      if (visible) {
        document.getElementById('approvalUrl').textContent = url;
        document.getElementById('approvalTitle').textContent = title;
      }
      banner.classList.toggle('visible', visible);
    }

    function signalApproval(approved) {
      setApprovalVisible(false, '', '');
      window.__rt_signal({ type: 'approval_done', approved: approved });
    }

    function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      appendMessage('You', msg, true);
      window.__rt_signal({ type: 'chat', message: msg });
      input.value = '';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
